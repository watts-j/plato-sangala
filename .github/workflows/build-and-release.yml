name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. v2.23)'
        required: true

permissions:
  contents: write

env:
  TOOLCHAIN_URL: "https://releases.linaro.org/components/toolchain/binaries/4.9-2017.01/arm-linux-gnueabihf/gcc-linaro-4.9.4-2017.01-x86_64_arm-linux-gnueabihf.tar.xz"

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget jq patchelf

      - name: Cache Linaro toolchain
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: toolchain
          key: linaro-gcc-4.9.4-2017.01

      - name: Download Linaro toolchain
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          mkdir -p toolchain
          wget -q "$TOOLCHAIN_URL" -O toolchain.tar.xz
          tar -xf toolchain.tar.xz --strip-components=1 -C toolchain
          rm toolchain.tar.xz

      - name: Add toolchain to PATH
        run: echo "${{ github.workspace }}/toolchain/bin" >> $GITHUB_PATH

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: arm-unknown-linux-gnueabihf

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-arm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-arm-

      - name: Download pre-built libraries and build
        run: |
          # Use the fast method: download pre-built ARM libs from upstream Plato release
          ./build.sh fast

      - name: Create distribution package
        run: ./dist.sh

      - name: Determine release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.release_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Assemble shared content
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          mkdir -p shared-content

          # Plato application
          mkdir -p shared-content/.adds/plato
          cp -R dist/* shared-content/.adds/plato/
          cp sangala/Settings.toml shared-content/.adds/plato/Settings.toml
          mkdir -p shared-content/.adds/plato/resources
          cp sangala/kobo-assets/plato-resources/home.png shared-content/.adds/plato/resources/home.png

          # Dictionary (StarDict format, converted on first use)
          cp sangala/dictionaries/* shared-content/.adds/plato/dictionaries/

          # Kobo screensaver and config (no KoboRoot.tgz)
          mkdir -p shared-content/.kobo
          cp -R sangala/kobo-assets/screensaver shared-content/.kobo/
          cp -R sangala/kobo-assets/Kobo shared-content/.kobo/

          # Library content (EPUBs) — dot-prefixed folders hidden from Nickel
          shopt -s dotglob
          cp -R sangala/library-skeleton/* shared-content/
          shopt -u dotglob

          # Clean up
          find shared-content -name '.gitkeep' -delete

      - name: Assemble update package
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          UPDATE="plato-sangala-${TAG}-update"
          cp -R shared-content "${UPDATE}"
          cp sangala/installer/install-sangala.ps1 "${UPDATE}/"
          tar -czf "${UPDATE}.tar.gz" "${UPDATE}"

      - name: Assemble install package
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          INSTALL="plato-sangala-${TAG}-install"
          cp -R shared-content "${INSTALL}"
          # Add KoboRoot.tgz for first-time system setup
          cp sangala/kobo-assets/KoboRoot.tgz "${INSTALL}/.kobo/KoboRoot.tgz"
          cp sangala/installer/install-sangala.ps1 "${INSTALL}/"
          tar -czf "${INSTALL}.tar.gz" "${INSTALL}"

      - name: Upload update artifact
        uses: actions/upload-artifact@v4
        with:
          name: plato-sangala-${{ steps.tag.outputs.tag }}-update
          path: plato-sangala-${{ steps.tag.outputs.tag }}-update.tar.gz

      - name: Upload install artifact
        uses: actions/upload-artifact@v4
        with:
          name: plato-sangala-${{ steps.tag.outputs.tag }}-install
          path: plato-sangala-${{ steps.tag.outputs.tag }}-install.tar.gz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Plato Sangala ${{ steps.tag.outputs.tag }}"
          body: |
            ## Plato Sangala ${{ steps.tag.outputs.tag }}

            Customized Plato build for Kobo Clara BW.

            ### Two packages:

            **`-install.tar.gz`** — For new/factory-reset devices.
            Includes system-level auto-launch setup. Device will reboot once during first boot.

            **`-update.tar.gz`** — For devices that already have Plato installed.
            No system changes, no reboot. Just copy and eject.

            ### Instructions
            1. Connect Kobo to computer via USB
            2. Extract the appropriate archive
            3. Copy the **contents** to the root of the Kobo drive
            4. Eject the Kobo

            ### Included EPUB content
            - **STEM > Science > Biology**: Concepts of Biology
            - **Enrichment > Fiction**: Penrod, The Verger
            - **Enrichment > Sangala Story Exchange**: A Leopard in the Forest
            - **Resources > About**: Sangala Reader Initiative
            - **Resources > Newsletters**: Newsletter (Fall 2025) - REACH for Uganda
          files: |
            plato-sangala-${{ steps.tag.outputs.tag }}-install.tar.gz
            plato-sangala-${{ steps.tag.outputs.tag }}-update.tar.gz
          draft: false
          prerelease: false
