name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. v2.23)'
        required: true

permissions:
  contents: write

env:
  TOOLCHAIN_URL: "https://releases.linaro.org/components/toolchain/binaries/4.9-2017.01/arm-linux-gnueabihf/gcc-linaro-4.9.4-2017.01-x86_64_arm-linux-gnueabihf.tar.xz"

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget jq patchelf

      - name: Cache Linaro toolchain
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: toolchain
          key: linaro-gcc-4.9.4-2017.01

      - name: Download Linaro toolchain
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          mkdir -p toolchain
          wget -q "$TOOLCHAIN_URL" -O toolchain.tar.xz
          tar -xf toolchain.tar.xz --strip-components=1 -C toolchain
          rm toolchain.tar.xz

      - name: Add toolchain to PATH
        run: echo "${{ github.workspace }}/toolchain/bin" >> $GITHUB_PATH

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: arm-unknown-linux-gnueabihf

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-arm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-arm-

      - name: Download pre-built libraries and build
        run: |
          # Use the fast method: download pre-built ARM libs from upstream Plato release
          ./build.sh fast

      - name: Create distribution package
        run: ./dist.sh

      - name: Determine release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.release_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Assemble shared content
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          mkdir -p shared-content

          # Plato application
          mkdir -p shared-content/.adds/plato
          cp -R dist/* shared-content/.adds/plato/
          cp sangala/Settings.toml shared-content/.adds/plato/Settings.toml
          mkdir -p shared-content/.adds/plato/resources
          cp sangala/kobo-assets/plato-resources/home.png shared-content/.adds/plato/resources/home.png

          # Kobo screensaver and config (KoboRoot.tgz added to install package only)
          mkdir -p shared-content/.kobo
          cp -R sangala/kobo-assets/screensaver shared-content/.kobo/
          cp -R sangala/kobo-assets/Kobo shared-content/.kobo/

          # Clean up
          find shared-content -name '.gitkeep' -delete

      - name: Assemble update package
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          UPDATE="plato-sangala-${TAG}-update"
          cp -R shared-content "${UPDATE}"
          # Library content (EPUBs) — dot-prefixed folders hidden from Nickel.
          # Shipped only in the update package so the install package stays small.
          shopt -s dotglob
          cp -R sangala/library-skeleton/* "${UPDATE}/"
          shopt -u dotglob
          find "${UPDATE}" -name '.gitkeep' -delete
          tar -czf "${UPDATE}.tar.gz" "${UPDATE}"

      - name: Assemble install package
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          INSTALL="plato-sangala-${TAG}-install"
          cp -R shared-content "${INSTALL}"
          # Dictionary (StarDict source, converted on-device on first boot).
          # Install-only: shipping these in the update package overwrites the
          # on-device .dict.dz produced by convert-dictionary.sh while leaving
          # the matching .index untouched -- lookups then return wrong-offset
          # fragments with raw StarDict markers leaking through (see Lesson #31).
          mkdir -p "${INSTALL}/.adds/plato/dictionaries"
          cp sangala/dictionaries/* "${INSTALL}/.adds/plato/dictionaries/"
          # Add KoboRoot.tgz for first-time system setup
          cp sangala/kobo-assets/KoboRoot.tgz "${INSTALL}/.kobo/KoboRoot.tgz"
          tar -czf "${INSTALL}.tar.gz" "${INSTALL}"

      - name: Bundle installer scripts
        run: |
          # Wrap the CLI installer in a .zip so it's a normal downloadable
          # asset (GitHub's release UI sometimes hides bare .ps1 attachments).
          # Only the CLI .ps1 ships -- the GUI .exe is built in a separate job
          # as a parse-check but is NOT uploaded, pending investigation of
          # GUI-installer-correlated factory resets seen in production.
          cp sangala/installer/install-sangala.ps1 install-sangala.ps1
          zip install-sangala.zip install-sangala.ps1
          echo "All release files:"
          ls -la plato-sangala-*-install.tar.gz plato-sangala-*-update.tar.gz install-sangala.zip

      - name: Upload update artifact
        uses: actions/upload-artifact@v4
        with:
          name: plato-sangala-${{ steps.tag.outputs.tag }}-update
          path: plato-sangala-${{ steps.tag.outputs.tag }}-update.tar.gz

      - name: Upload install artifact
        uses: actions/upload-artifact@v4
        with:
          name: plato-sangala-${{ steps.tag.outputs.tag }}-install
          path: plato-sangala-${{ steps.tag.outputs.tag }}-install.tar.gz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Plato Sangala ${{ steps.tag.outputs.tag }}"
          body: |
            ## Plato Sangala ${{ steps.tag.outputs.tag }}

            Customized Plato build for Kobo Clara BW.

            ### Two packages, applied in sequence for a fresh install:

            **`-install.tar.gz`** — Bootstrap (~30MB). System-level auto-launch
            setup, Plato app, Settings, dictionaries, screensaver. No EPUBs.
            Triggers an "updating" screen and one automatic reboot.

            **`-update.tar.gz`** — Content (~80MB). Plato app, Settings, and
            the EPUB library. No system changes, no reboot. Dictionaries are
            install-only so subsequent updates don't clobber the converted
            on-device dictd files.

            ### Manual install
            1. Connect Kobo via USB.
            2. Extract `-install.tar.gz`. Copy its contents to the root of the
               Kobo drive (be sure hidden files are visible — package contains
               dot-prefixed folders).
            3. Eject. Device shows "updating" and auto-reboots.
            4. Reconnect. Extract `-update.tar.gz`. Copy contents to the drive
               root.
            5. Eject.

            ### Subsequent updates
            Apply only `-update.tar.gz` — manual steps 4–5 above.
          files: |
            plato-sangala-${{ steps.tag.outputs.tag }}-install.tar.gz
            plato-sangala-${{ steps.tag.outputs.tag }}-update.tar.gz
            install-sangala.zip
          draft: false
          # Tag releases ship as pre-release by default; manually promote to
          # stable on the GitHub Releases page once a device test passes.
          prerelease: true

  gui-exe-parse-check:
    # Smoke-check that the GUI installer .ps1 still PS2EXE-compiles without
    # error. Output is NOT uploaded to the release -- the GUI installer was
    # implicated in occasional Kobo factory resets on production devices
    # (root cause not yet identified), so releases ship the CLI .ps1 only
    # until the GUI is debugged. Keeping this job lets us catch parse / .NET
    # regressions in the GUI source without re-introducing the .exe into the
    # release zip.
    runs-on: windows-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build GUI installer .exe via PS2EXE (smoke check, not uploaded)
        shell: pwsh
        run: |
          Install-Module -Name ps2exe -Force -Scope CurrentUser -SkipPublisherCheck
          Invoke-ps2exe `
            -InputFile sangala\installer\install-sangala-gui.ps1 `
            -OutputFile install-sangala-gui.exe `
            -NoConsole `
            -Title 'Sangala eReader Installer'
          if (-not (Test-Path install-sangala-gui.exe)) {
            throw 'PS2EXE produced no output -- aborting.'
          }
          Get-Item install-sangala-gui.exe | Format-List Name, Length, LastWriteTime
