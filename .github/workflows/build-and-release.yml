name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. v2.3.1)'
        required: true

permissions:
  contents: write

env:
  TOOLCHAIN_URL: "https://releases.linaro.org/components/toolchain/binaries/4.9-2017.01/arm-linux-gnueabihf/gcc-linaro-4.9.4-2017.01-x86_64_arm-linux-gnueabihf.tar.xz"

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget jq patchelf

      - name: Cache Linaro toolchain
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: toolchain
          key: linaro-gcc-4.9.4-2017.01

      - name: Download Linaro toolchain
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          mkdir -p toolchain
          wget -q "$TOOLCHAIN_URL" -O toolchain.tar.xz
          tar -xf toolchain.tar.xz --strip-components=1 -C toolchain
          rm toolchain.tar.xz

      - name: Add toolchain to PATH
        run: echo "${{ github.workspace }}/toolchain/bin" >> $GITHUB_PATH

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: arm-unknown-linux-gnueabihf

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-arm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-arm-

      - name: Download pre-built libraries and build
        run: |
          # Use the fast method: download pre-built ARM libs from upstream Plato release
          ./build.sh fast

      - name: Create distribution package
        run: ./dist.sh

      - name: Determine release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.release_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Assemble Kobo filesystem image
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          PKG="plato-sangala-${TAG}"
          mkdir -p "${PKG}"

          # --- Plato application ---
          mkdir -p "${PKG}/.adds/plato"
          cp -R dist/* "${PKG}/.adds/plato/"
          cp sangala/Settings.toml "${PKG}/.adds/plato/Settings.toml"
          mkdir -p "${PKG}/.adds/plato/resources"
          cp sangala/kobo-assets/plato-resources/home.png "${PKG}/.adds/plato/resources/home.png"

          # --- Dictionary (StarDict format, converted on first use) ---
          cp sangala/dictionaries/* "${PKG}/.adds/plato/dictionaries/"

          # --- Kobo assets (KoboRoot.tgz, screensaver, config) ---
          mkdir -p "${PKG}/.kobo"
          cp sangala/kobo-assets/KoboRoot.tgz "${PKG}/.kobo/KoboRoot.tgz"
          cp -R sangala/kobo-assets/screensaver "${PKG}/.kobo/"
          cp -R sangala/kobo-assets/Kobo "${PKG}/.kobo/"

          # --- Library content (EPUBs) ---
          cp -R sangala/library-skeleton/* "${PKG}/"

          # Clean up
          find "${PKG}" -name '.gitkeep' -delete

          # Package it
          tar -czf "${PKG}.tar.gz" "${PKG}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: plato-sangala-${{ steps.tag.outputs.tag }}
          path: plato-sangala-${{ steps.tag.outputs.tag }}.tar.gz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Plato Sangala ${{ steps.tag.outputs.tag }}"
          body: |
            ## Plato Sangala ${{ steps.tag.outputs.tag }}

            Customized Plato build for Kobo Clara BW.
            Auto-launches Plato on boot via plato-autostart.sh.

            ### Installation (fresh or update)
            1. Connect Kobo to computer via USB
            2. Extract the archive
            3. Copy the **contents** of `plato-sangala-${{ steps.tag.outputs.tag }}/` to the root of the Kobo drive
            4. Eject the Kobo — it will auto-launch Plato on boot

            ### Included EPUB content
            - **STEM > Biology**: Concepts of Biology
            - **Enrichment > Fiction**: Penrod, The Verger
            - **Enrichment > Sangala Story Exchange**: A Leopard in the Forest
            - **Resources > About the Reader**: Sangala Reader Initiative
            - **Resources > Newsletters**: Newsletter (Fall 2025) - REACH for Uganda
          files: plato-sangala-${{ steps.tag.outputs.tag }}.tar.gz
          draft: false
          prerelease: false
