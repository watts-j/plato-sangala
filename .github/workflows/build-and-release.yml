name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. v2.23)'
        required: true

permissions:
  contents: write

env:
  # ARM cross-toolchain — Linaro 4.9.4-2017.01, hard-float (gnueabihf).
  # PINNED ON PURPOSE: its glibc matches the Kobo's old glibc. Do NOT bump to a
  # newer toolchain — a newer glibc produces binaries that won't launch on the
  # device (the dynamic linker rejects unknown GLIBC_* symbol versions).
  #
  # Self-hosted as a release asset on THIS repo because Linaro's original host
  # now returns 403 for these legacy binaries (program EOL'd, handed to Arm).
  # The build's correctness must not depend on a third party. Trust is anchored
  # to TOOLCHAIN_SHA256, not the host: a corrupt or tampered download fails the
  # build. To (re)provision: download the exact tarball once (Arm's "Legacy
  # Linaro GNU Toolchains" archive), verify it, upload it as an asset on the
  # "build-deps" release, and set TOOLCHAIN_SHA256 below to its sha256sum.
  TOOLCHAIN_URL: "https://github.com/watts-j/plato-sangala/releases/download/build-deps/gcc-linaro-4.9.4-2017.01-x86_64_arm-linux-gnueabihf.tar.xz"
  TOOLCHAIN_SHA256: "22914118fd963f953824b58107015c6953b5bbdccbdcf25ad9fd9a2f9f11ac07"

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget jq patchelf

      # Cache is only an optimization. The hash-pinned download below is the
      # source of truth, so an evicted cache can no longer break the build.
      - name: Cache cross-toolchain
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: toolchain
          key: linaro-gcc-4.9.4-2017.01

      - name: Download cross-toolchain (self-hosted, hash-pinned)
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          if [ "$TOOLCHAIN_SHA256" = "REPLACE_WITH_SHA256_OF_THE_VERIFIED_TARBALL" ]; then
            echo "::error::TOOLCHAIN_SHA256 is unset. Upload the toolchain to the 'build-deps' release and set its sha256 in build-and-release.yml (see CLAUDE-STATE)."
            exit 1
          fi
          mkdir -p toolchain
          # Retry to ride out transient network blips.
          ok=
          for attempt in 1 2 3 4 5; do
            if wget -q --tries=2 --timeout=30 "$TOOLCHAIN_URL" -O toolchain.tar.xz; then
              ok=1; break
            fi
            echo "Download attempt $attempt failed; retrying in $((attempt * 5))s..."
            sleep $((attempt * 5))
          done
          [ -n "$ok" ] || { echo "::error::toolchain download failed from $TOOLCHAIN_URL"; exit 1; }
          # Integrity gate: trust the hash, not the host. Fail closed.
          echo "${TOOLCHAIN_SHA256}  toolchain.tar.xz" | sha256sum -c -
          tar -xf toolchain.tar.xz --strip-components=1 -C toolchain
          rm toolchain.tar.xz

      - name: Add toolchain to PATH
        run: echo "${{ github.workspace }}/toolchain/bin" >> $GITHUB_PATH

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: arm-unknown-linux-gnueabihf

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-arm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-arm-

      - name: Download pre-built libraries and build
        run: |
          # Use the fast method: download pre-built ARM libs from upstream Plato release
          ./build.sh fast

      - name: Create distribution package
        run: ./dist.sh

      - name: Determine release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.release_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Assemble shared content
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          mkdir -p shared-content

          # Plato application
          mkdir -p shared-content/.adds/plato
          cp -R dist/* shared-content/.adds/plato/
          cp sangala/Settings.toml shared-content/.adds/plato/Settings.toml
          mkdir -p shared-content/.adds/plato/resources
          cp sangala/kobo-assets/plato-resources/home.png shared-content/.adds/plato/resources/home.png

          # KFMon trigger file (1x1 PNG that Nickel indexes; KFMon watches for an
          # OPEN event on it via plato.ini and fires plato.sh in response).
          cp sangala/kobo-assets/plato-resources/launch.png shared-content/.adds/plato/launch.png

          # Dictionary (StarDict format, converted on first use)
          cp sangala/dictionaries/* shared-content/.adds/plato/dictionaries/

          # Version stamp so devices can be identified post-install
          # (tools/verify-device-version.ps1 reads this file).
          printf '%s\n' "${TAG}" > shared-content/.adds/plato/VERSION

          # User-partition KFMon + NickelMenu config. KoboRoot.tgz ships the
          # daemon binaries and the libnm.so plugin; this is the per-device
          # config that the daemon reads.
          shopt -s dotglob
          cp -R sangala/user-content/* shared-content/
          shopt -u dotglob

          # Kobo screensaver and config (KoboRoot.tgz added to install package only)
          mkdir -p shared-content/.kobo
          cp -R sangala/kobo-assets/screensaver shared-content/.kobo/
          cp -R sangala/kobo-assets/Kobo shared-content/.kobo/

          # Clean up
          find shared-content -name '.gitkeep' -delete

      - name: Assemble library package
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          LIBRARY="plato-sangala-${TAG}-library"
          mkdir -p "${LIBRARY}"
          # Pure content. No install script, no system files. The deployer
          # extracts this and drag-drops its contents onto the Kobo's root
          # over USB to populate the library on a device that already has
          # the install package applied.
          shopt -s dotglob
          cp -R sangala/library-skeleton/* "${LIBRARY}/"
          shopt -u dotglob
          find "${LIBRARY}" -name '.gitkeep' -delete
          tar -czf "${LIBRARY}.tar.gz" "${LIBRARY}"

      - name: Assemble install package
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          INSTALL="plato-sangala-${TAG}-install"
          cp -R shared-content "${INSTALL}"
          # Add KoboRoot.tgz for first-time system setup
          cp sangala/kobo-assets/KoboRoot.tgz "${INSTALL}/.kobo/KoboRoot.tgz"
          # Pre-create the dot-prefixed library folder structure (empty) so
          # Plato's cascading menu shows every category on first launch even
          # before the separate library package is applied. Mirror the
          # directory layout from library-skeleton; files are NOT copied
          # (they belong in the -library.tar.gz artifact, not here).
          (cd sangala/library-skeleton && find . -mindepth 1 -type d -print0) \
            | xargs -0 -I {} mkdir -p "${INSTALL}/{}"
          tar -czf "${INSTALL}.tar.gz" "${INSTALL}"

      - name: Bundle installer scripts
        run: |
          # Wrap both .ps1 installers in a .zip so they're normal downloadable
          # assets. GitHub's release UI sometimes hides bare .ps1 attachments.
          cp sangala/installer/install-sangala.ps1 install-sangala.ps1
          cp sangala/installer/install-sangala-gui.ps1 install-sangala-gui.ps1
          zip install-sangala.zip install-sangala.ps1 install-sangala-gui.ps1
          echo "All release files:"
          ls -la plato-sangala-*-install.tar.gz plato-sangala-*-library.tar.gz install-sangala.zip

      - name: Upload library artifact
        uses: actions/upload-artifact@v4
        with:
          name: plato-sangala-${{ steps.tag.outputs.tag }}-library
          path: plato-sangala-${{ steps.tag.outputs.tag }}-library.tar.gz

      - name: Upload install artifact
        uses: actions/upload-artifact@v4
        with:
          name: plato-sangala-${{ steps.tag.outputs.tag }}-install
          path: plato-sangala-${{ steps.tag.outputs.tag }}-install.tar.gz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Plato Sangala ${{ steps.tag.outputs.tag }}"
          body: |
            ## Plato Sangala ${{ steps.tag.outputs.tag }}

            Customized Plato build for Kobo Clara BW.

            **Launch architecture (v2.49+):** KFMon + NickelMenu, restored
            from v2.19's working setup. Nickel boots normally first; KFMon
            detects its scanner indexing `.adds/plato/launch.png` and fires
            `plato.sh` after Nickel reaches the home screen (~1–3 s of
            Nickel home visible at boot, then Plato takes over). This
            replaces the v2.20–v2.48.1 "minimal KoboRoot.tgz" architecture
            where `plato-autostart.sh` killed Nickel mid-boot — that
            architecture surfaced the factory-reset-on-multi-power-cycle
            bug (Lessons #31, #37 in `CLAUDE-STATE.md`). KFMon-style
            launching lets Nickel finish booting and write its bootloader
            healthy-boot marker, so the watchdog counter resets every
            cycle. NickelMenu also adds a manual "Plato" entry to Nickel's
            burger menu as a fallback if `on_boot` ever fails to fire.

            ### Packages

            **`-install.tar.gz`** — System install (~70MB). KFMon daemon
            binaries, NickelMenu Qt plugin, KFMon-aware `on-animator.sh`,
            Plato app, Settings, dictionaries, screensaver, KoboRoot.tgz
            system bootstrap, and the empty dot-prefixed library folder
            structure. Triggers an "updating" screen and one automatic
            reboot. This is what makes the device run Sangala; no EPUB
            content.

            **`-library.tar.gz`** — Library content. Contains the EPUB
            collection laid out under the dot-prefixed category folders
            (`.STEM/Science/Biology/...`, etc.). Pure content — no
            install script, no system files. Extract and drag-drop the
            contents onto a device that already has the install package
            applied.

            ### Install procedure
            1. Connect Kobo via USB. Tap "Connect USB" when prompted.
            2. Extract `-install.tar.gz`. Copy its contents to the root
               of the Kobo drive (enable hidden files in Explorer —
               package contains dot-prefixed folders).
            3. Click the taskbar USB-eject icon, wait for the "Safe To
               Remove" notification, then unplug. Do NOT use the .ps1
               installer's eject path on this Windows setup (it falls back
               to a cooperative dismount that leaves the FAT dirty,
               causing fsck to truncate the dictionary on next boot —
               see Lesson #42 in CLAUDE-STATE).
            4. Device shows "updating" and auto-reboots into Plato.
            5. **Wait at least 3 minutes** before reconnecting — Plato
               is running `convert-dictionary.sh` in the background and
               interrupting it leaves a corrupted dictionary file that
               crashes Plato on next book-open (SIGBUS on truncated
               mmap).
            6. Reconnect via USB. Extract `-library.tar.gz` and copy its
               contents to the root of the Kobo drive. Eject the same
               clean way as step 3.

            ### Subsequent updates
            Apply `-install.tar.gz` again (re-triggers the "updating"
            screen and reboot, which is the safe path). Library content
            is preserved across install reapplications because the
            install package ships only empty folder structure.
          files: |
            plato-sangala-${{ steps.tag.outputs.tag }}-install.tar.gz
            plato-sangala-${{ steps.tag.outputs.tag }}-library.tar.gz
            install-sangala.zip
          draft: false
          # Tag releases ship as pre-release by default; manually promote to
          # stable on the GitHub Releases page once a device test passes.
          prerelease: true
